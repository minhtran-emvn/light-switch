<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>💡 Công Tắc Đèn</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            transition: background 0.5s ease, filter 0.5s ease;
            padding: 20px;
        }

        /* Light ON state - dynamic brightness */
        body.light-on {
            background: linear-gradient(135deg, #fef9e7 0%, #fde9b9 50%, #f9d67a 100%);
        }

        /* Light OFF state */
        body.light-off {
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%);
        }

        .container {
            text-align: center;
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(10px);
            border-radius: 30px;
            padding: 50px 40px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            max-width: 400px;
            width: 100%;
        }

        .light-bulb {
            cursor: pointer;
            transition: all 0.3s ease;
            user-select: none;
            margin-bottom: 30px;
            display: inline-block;
            width: 180px;
            height: 180px;
        }

        .light-bulb:hover {
            transform: scale(1.05);
        }

        .light-bulb.on {
            animation: glow 1s ease-in-out infinite alternate;
        }

        @keyframes glow {
            from {
                filter: drop-shadow(0 0 30px rgba(255, 255, 0, 0.6))
                        drop-shadow(0 0 60px rgba(255, 200, 0, 0.4));
            }
            to {
                filter: drop-shadow(0 0 50px rgba(255, 255, 0, 0.9))
                        drop-shadow(0 0 100px rgba(255, 200, 0, 0.6));
            }
        }

        .switch-btn {
            padding: 18px 50px;
            font-size: 1.3em;
            font-weight: bold;
            border: none;
            border-radius: 50px;
            cursor: pointer;
            transition: all 0.3s ease;
            text-transform: uppercase;
            letter-spacing: 2px;
            margin-bottom: 25px;
        }

        .switch-btn.on {
            background: linear-gradient(135deg, #f9d67a, #f9a825);
            color: #1a1a2e;
            box-shadow: 0 10px 30px rgba(249, 168, 37, 0.4);
        }

        .switch-btn.off {
            background: linear-gradient(135deg, #4a4a6a, #2a2a4a);
            color: #fde9b9;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.4);
        }

        .switch-btn:hover {
            transform: translateY(-3px);
        }

        .switch-btn:active {
            transform: translateY(0);
        }

        /* Brightness slider container */
        .brightness-container {
            margin: 25px 0;
            padding: 20px;
            background: rgba(0, 0, 0, 0.2);
            border-radius: 20px;
            opacity: 0.5;
            pointer-events: none;
            transition: all 0.3s ease;
        }

        .light-on .brightness-container {
            opacity: 1;
            pointer-events: all;
        }

        .brightness-label {
            font-size: 1em;
            color: #fde9b9;
            margin-bottom: 15px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .brightness-value {
            font-weight: bold;
            color: #f9d67a;
        }

        .brightness-slider {
            width: 100%;
            height: 12px;
            border-radius: 10px;
            background: linear-gradient(to right, #4a4a6a, #f9d67a, #f9a825);
            outline: none;
            -webkit-appearance: none;
            appearance: none;
            cursor: pointer;
        }

        .brightness-slider::-webkit-slider-thumb {
            -webkit-appearance: none;
            appearance: none;
            width: 28px;
            height: 28px;
            border-radius: 50%;
            background: #ffffff;
            cursor: pointer;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.3);
            transition: transform 0.2s ease;
        }

        .brightness-slider::-webkit-slider-thumb:hover {
            transform: scale(1.2);
        }

        .brightness-slider::-moz-range-thumb {
            width: 28px;
            height: 28px;
            border-radius: 50%;
            background: #ffffff;
            cursor: pointer;
            border: none;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.3);
            transition: transform 0.2s ease;
        }

        .brightness-slider::-moz-range-thumb:hover {
            transform: scale(1.2);
        }

        .status {
            margin-top: 25px;
            font-size: 1.4em;
            font-weight: bold;
            transition: color 0.5s ease;
        }

        .light-on .status {
            color: #f9a825;
        }

        .light-off .status {
            color: #888;
        }

        .toggle-count {
            margin-top: 20px;
            font-size: 0.9em;
            color: #888;
        }

        .light-on .toggle-count {
            color: #666;
        }

        /* Brightness icons */
        .brightness-icons {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 10px;
            font-size: 1.2em;
        }

        /* Color picker container */
        .color-container {
            margin: 25px 0;
            padding: 20px;
            background: rgba(0, 0, 0, 0.2);
            border-radius: 20px;
            opacity: 0.5;
            pointer-events: none;
            transition: all 0.3s ease;
        }

        .light-on .color-container {
            opacity: 1;
            pointer-events: all;
        }

        .color-label {
            font-size: 1em;
            color: #fde9b9;
            margin-bottom: 15px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .color-value {
            font-weight: bold;
            color: #f9d67a;
            text-transform: uppercase;
        }

        .color-picker-wrapper {
            display: flex;
            gap: 15px;
            align-items: center;
            justify-content: center;
        }

        .color-picker {
            width: 60px;
            height: 60px;
            border: none;
            border-radius: 50%;
            cursor: pointer;
            overflow: hidden;
            padding: 0;
            background: none;
            transition: transform 0.2s ease;
        }

        .color-picker:hover {
            transform: scale(1.1);
        }

        .color-picker::-webkit-color-swatch-wrapper {
            padding: 0;
        }

        .color-picker::-webkit-color-swatch {
            border: 3px solid #ffffff;
            border-radius: 50%;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.3);
        }

        .color-picker::-moz-color-swatch {
            border: 3px solid #ffffff;
            border-radius: 50%;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.3);
        }

        .color-presets {
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
            justify-content: center;
            margin-top: 15px;
        }

        .color-preset {
            width: 35px;
            height: 35px;
            border-radius: 50%;
            border: 3px solid rgba(255, 255, 255, 0.5);
            cursor: pointer;
            transition: all 0.2s ease;
        }

        .color-preset:hover {
            transform: scale(1.15);
            border-color: #ffffff;
        }

        .color-preset.active {
            border-color: #f9d67a;
            box-shadow: 0 0 20px rgba(249, 214, 122, 0.6);
        }
    </style>
</head>
<body class="light-off">
    <div class="container">
        <!-- SVG Light Bulb -->
        <div class="light-bulb off" id="light-bulb" onclick="toggleLight()">
            <svg viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
                <!-- Bulb glass -->
                <path d="M12 2C8.13 2 5 5.13 5 9c0 2.38 1.19 4.47 3 5.74V17c0 .55.45 1 1 1h6c.55 0 1-.45 1-1v-2.26c1.81-1.27 3-3.36 3-5.74 0-3.87-3.13-7-7-7z" 
                      fill="#f9d67a" stroke="#f9a825" stroke-width="1.5" stroke-linejoin="round"/>
                <!-- Bulb base -->
                <rect x="9" y="17" width="6" height="3" fill="#a0a0a0" stroke="#707070" stroke-width="1.5"/>
                <rect x="9" y="20" width="6" height="2" fill="#808080" stroke="#606060" stroke-width="1.5"/>
                <!-- Filament -->
                <path d="M10 9c0-1.1.9-2 2-2s2 .9 2 2" stroke="#f9a825" stroke-width="1" fill="none" opacity="0.6"/>
                <path d="M12 7v3" stroke="#f9a825" stroke-width="1" fill="none" opacity="0.6"/>
            </svg>
        </div>
        
        <button class="switch-btn off" id="switch-btn" onclick="toggleLight()">
            Bật đèn
        </button>

        <!-- Brightness Control -->
        <div class="brightness-container" id="brightness-container">
            <div class="brightness-label">
                <span>🔆 Độ sáng</span>
                <span class="brightness-value" id="brightness-value">100%</span>
            </div>
            <input 
                type="range" 
                min="10" 
                max="100" 
                value="100" 
                class="brightness-slider" 
                id="brightness-slider"
                onchange="updateBrightness(this.value)"
            >
        </div>

        <!-- Color Control -->
        <div class="color-container" id="color-container">
            <div class="color-label">
                <span>🎨 Màu đèn</span>
                <span class="color-value" id="color-value">#F9D67A</span>
            </div>
            <div class="color-picker-wrapper">
                <input 
                    type="color" 
                    value="#f9d67a" 
                    class="color-picker" 
                    id="color-picker"
                    onchange="updateColor(this.value)"
                >
            </div>
            <div class="color-presets" id="color-presets">
                <div class="color-preset active" style="background: #f9d67a;" data-color="#f9d67a" onclick="selectPreset('#f9d67a')"></div>
                <div class="color-preset" style="background: #ff6b6b;" data-color="#ff6b6b" onclick="selectPreset('#ff6b6b')"></div>
                <div class="color-preset" style="background: #4ecdc4;" data-color="#4ecdc4" onclick="selectPreset('#4ecdc4')"></div>
                <div class="color-preset" style="background: #95e1d3;" data-color="#95e1d3" onclick="selectPreset('#95e1d3')"></div>
                <div class="color-preset" style="background: #dda0dd;" data-color="#dda0dd" onclick="selectPreset('#dda0dd')"></div>
                <div class="color-preset" style="background: #ffffff;" data-color="#ffffff" onclick="selectPreset('#ffffff')"></div>
            </div>
        </div>
        
        <div class="status" id="status">
            Đèn đang TẮT
        </div>
        
        <div class="toggle-count">
            Số lần bật/tắt: <span id="count">0</span>
        </div>
    </div>

    <script>
        let isLightOn = false;
        let toggleCount = 0;
        let brightness = 100;
        let currentColor = '#f9d67a';

        function toggleLight() {
            isLightOn = !isLightOn;
            toggleCount++;
            
            const body = document.body;
            const lightBulb = document.getElementById('light-bulb');
            const switchBtn = document.getElementById('switch-btn');
            const status = document.getElementById('status');
            const count = document.getElementById('count');
            const brightnessContainer = document.getElementById('brightness-container');
            const bulbSvg = lightBulb.querySelector('svg');
            
            if (isLightOn) {
                // Turn ON
                body.classList.remove('light-off');
                body.classList.add('light-on');
                
                lightBulb.classList.remove('off');
                lightBulb.classList.add('on');
                
                switchBtn.classList.remove('off');
                switchBtn.classList.add('on');
                switchBtn.textContent = 'Tắt đèn';
                
                status.textContent = 'Đèn đang BẬT ✨';
                
                // Enable brightness control
                brightnessContainer.style.opacity = '1';
                brightnessContainer.style.pointerEvents = 'all';
                
                // Apply current brightness
                applyBrightness(brightness);
            } else {
                // Turn OFF
                body.classList.remove('light-on');
                body.classList.add('light-off');
                
                lightBulb.classList.remove('on');
                lightBulb.classList.add('off');
                
                switchBtn.classList.remove('on');
                switchBtn.classList.add('off');
                switchBtn.textContent = 'Bật đèn';
                
                status.textContent = 'Đèn đang TẮT 🌙';
                
                // Disable brightness control
                brightnessContainer.style.opacity = '0.5';
                brightnessContainer.style.pointerEvents = 'none';
                
                // Reset bulb and background
                bulbSvg.style.opacity = '1';
                bulbSvg.style.filter = 'none';
                body.style.filter = 'none';
            }
            
            count.textContent = toggleCount;
            
            // Save state to localStorage
            saveState();
        }

        function updateBrightness(value) {
            brightness = parseInt(value);
            document.getElementById('brightness-value').textContent = brightness + '%';
            
            if (isLightOn) {
                applyBrightness(brightness);
                saveState();
            }
        }

        function applyBrightness(value) {
            const lightBulb = document.getElementById('light-bulb');
            const bulbSvg = lightBulb.querySelector('svg');
            const body = document.body;
            
            // Calculate brightness factor (0.1 to 1.0)
            const factor = value / 100;
            
            // Apply to bulb - opacity and glow
            bulbSvg.style.opacity = 0.3 + (factor * 0.7);
            const glowIntensity = factor;
            
            // Parse current color to RGB for glow effect
            const rgb = hexToRgb(currentColor);
            bulbSvg.style.filter = `drop-shadow(0 0 ${30 * glowIntensity}px rgba(${rgb.r}, ${rgb.g}, ${rgb.b}, ${0.6 * glowIntensity}))
                                    drop-shadow(0 0 ${60 * glowIntensity}px rgba(${rgb.r}, ${rgb.g}, ${rgb.b}, ${0.4 * glowIntensity}))`;
            
            // Apply to background - adjust overall brightness with CSS filter
            // At 100%: no filter (normal), at 10%: darker background
            const bgBrightness = 0.5 + (factor * 0.5); // ranges from 0.5 to 1.0
            body.style.filter = `brightness(${bgBrightness})`;
        }

        function updateColor(color) {
            currentColor = color;
            document.getElementById('color-value').textContent = color.toUpperCase();
            document.getElementById('color-picker').value = color;
            
            // Update active preset
            document.querySelectorAll('.color-preset').forEach(preset => {
                preset.classList.remove('active');
                if (preset.dataset.color.toLowerCase() === color.toLowerCase()) {
                    preset.classList.add('active');
                }
            });
            
            if (isLightOn) {
                applyColor(color);
                saveState();
            }
        }

        function selectPreset(color) {
            updateColor(color);
        }

        function applyColor(color) {
            const lightBulb = document.getElementById('light-bulb');
            const bulbSvg = lightBulb.querySelector('svg');
            
            // Parse color to RGB
            const rgb = hexToRgb(color);
            
            // Update bulb glass fill color
            const bulbPath = bulbSvg.querySelector('path[d*="M12 2C8.13"]');
            if (bulbPath) {
                bulbPath.setAttribute('fill', color);
                bulbPath.setAttribute('stroke', adjustColor(color, -40));
            }
            
            // Update filament color
            const filaments = bulbSvg.querySelectorAll('path[stroke*="#f9a825"]');
            filaments.forEach(filament => {
                filament.setAttribute('stroke', adjustColor(color, -40));
            });
            
            // Re-apply brightness with new color
            if (isLightOn) {
                applyBrightness(brightness);
            }
        }

        function hexToRgb(hex) {
            const result = /^#?([a-f\d]{2})([a-f\d]{2})([a-f\d]{2})$/i.exec(hex);
            return result ? {
                r: parseInt(result[1], 16),
                g: parseInt(result[2], 16),
                b: parseInt(result[3], 16)
            } : { r: 249, g: 214, b: 122 };
        }

        function adjustColor(hex, amount) {
            const rgb = hexToRgb(hex);
            const r = Math.max(0, Math.min(255, rgb.r + amount));
            const g = Math.max(0, Math.min(255, rgb.g + amount));
            const b = Math.max(0, Math.min(255, rgb.b + amount));
            return `#${((1 << 24) + (r << 16) + (g << 8) + b).toString(16).slice(1)}`;
        }

        function saveState() {
            localStorage.setItem('lightState', isLightOn);
            localStorage.setItem('toggleCount', toggleCount);
            localStorage.setItem('brightness', brightness);
            localStorage.setItem('color', currentColor);
        }

        // Load saved state on page load
        window.addEventListener('DOMContentLoaded', () => {
            const savedState = localStorage.getItem('lightState');
            const savedCount = localStorage.getItem('toggleCount');
            const savedBrightness = localStorage.getItem('brightness');
            const savedColor = localStorage.getItem('color');
            
            if (savedState !== null) {
                isLightOn = savedState === 'true';
            }
            
            if (savedCount !== null) {
                toggleCount = parseInt(savedCount);
                document.getElementById('count').textContent = toggleCount;
            }
            
            if (savedBrightness !== null) {
                brightness = parseInt(savedBrightness);
                document.getElementById('brightness-slider').value = brightness;
                document.getElementById('brightness-value').textContent = brightness + '%';
            }
            
            if (savedColor !== null) {
                currentColor = savedColor;
                document.getElementById('color-picker').value = savedColor;
                document.getElementById('color-value').textContent = savedColor.toUpperCase();
                
                // Update active preset
                document.querySelectorAll('.color-preset').forEach(preset => {
                    preset.classList.remove('active');
                    if (preset.dataset.color.toLowerCase() === savedColor.toLowerCase()) {
                        preset.classList.add('active');
                    }
                });
                
                // Apply color to bulb
                applyColor(savedColor);
            }
            
            // Apply saved state
            if (isLightOn) {
                document.body.classList.remove('light-off');
                document.body.classList.add('light-on');
                document.getElementById('light-bulb').classList.remove('off');
                document.getElementById('light-bulb').classList.add('on');
                document.getElementById('switch-btn').classList.remove('off');
                document.getElementById('switch-btn').classList.add('on');
                document.getElementById('switch-btn').textContent = 'Tắt đèn';
                document.getElementById('status').textContent = 'Đèn đang BẬT ✨';
                
                // Enable brightness and color controls
                document.getElementById('brightness-container').style.opacity = '1';
                document.getElementById('brightness-container').style.pointerEvents = 'all';
                document.getElementById('color-container').style.opacity = '1';
                document.getElementById('color-container').style.pointerEvents = 'all';
                applyBrightness(brightness);
            }
        });
    </script>
</body>
</html>
